<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ruel G</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .card {
      background: white;
      padding: 40px 50px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      text-align: center;
      max-width: 640px;
      margin: 20px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: #1f2937;
    }
    p {
      margin: 0;
      font-size: 1.25rem;
      color: #4b5563;
    }
    .name {
      margin-top: 18px;
      font-weight: 700;
      color: #111827;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hi, this is my website</h1>
    <p class="name">Ruel G</p>
  </main>
</body>
</html>
